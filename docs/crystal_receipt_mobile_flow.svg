<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1320" viewBox="0 0 900 1320" role="img" aria-labelledby="title desc">
  <title id="title">ReceiptOS producer-neutral proof boundary</title>
  <desc id="desc">Many producer systems export evidence into one ReceiptOS proof boundary, which produces receipt roots, evidence capsules, provenance summaries, verifier state, and viewer/export/settlement-facing surfaces.</desc>

  <style>
    .bg { fill: #ffffff; }
    .box { fill: #ffffff; stroke: #111111; stroke-width: 3; }
    .soft { fill: #f7f7f7; stroke: #222222; stroke-width: 2; }
    .core { fill: #f2f8ff; stroke: #111111; stroke-width: 4; }
    .settle { fill: #f6fff2; stroke: #111111; stroke-width: 3; }
    .title { font: 700 34px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111111; }
    .h1 { font: 700 28px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111111; }
    .h2 { font: 700 21px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111111; }
    .body { font: 500 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111111; }
    .mono { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #111111; }
    .small { font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #333333; }
    .label { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 1.6px; fill: #555555; }
    .arrow { stroke: #111111; stroke-width: 4; fill: none; marker-end: url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#111111"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="900" height="1320"/>

  <text class="title" x="450" y="58" text-anchor="middle">RECEIPTOS</text>
  <text class="body" x="450" y="92" text-anchor="middle">Producer-neutral proof boundary for agent work</text>

  <rect class="box" x="70" y="130" width="760" height="190" rx="24"/>
  <text class="label" x="110" y="168">MANY PRODUCERS</text>
  <text class="h1" x="110" y="205">Different runtimes export evidence</text>

  <rect class="soft" x="110" y="230" width="150" height="54" rx="14"/>
  <text class="mono" x="185" y="264" text-anchor="middle">CYPHES / ATP</text>

  <rect class="soft" x="280" y="230" width="150" height="54" rx="14"/>
  <text class="mono" x="355" y="264" text-anchor="middle">Stealth</text>

  <rect class="soft" x="450" y="230" width="150" height="54" rx="14"/>
  <text class="mono" x="525" y="264" text-anchor="middle">GitHub Actions</text>

  <rect class="soft" x="620" y="230" width="150" height="54" rx="14"/>
  <text class="mono" x="695" y="264" text-anchor="middle">Coding agents</text>

  <text class="small" x="110" y="304">Producer systems keep their own workflow semantics.</text>

  <path class="arrow" d="M450 325 L450 382"/>

  <rect class="box" x="130" y="390" width="640" height="130" rx="22"/>
  <text class="label" x="170" y="426">EXPORTED EVIDENCE</text>
  <text class="h2" x="170" y="462">Source evidence enters ReceiptOS through adapters</text>
  <text class="mono" x="170" y="494">task · execution · commands · changes · verifier refs · metadata</text>

  <path class="arrow" d="M450 525 L450 585"/>

  <rect class="core" x="80" y="595" width="740" height="250" rx="28"/>
  <text class="label" x="120" y="632">ONE PROOF BOUNDARY</text>
  <text class="h1" x="120" y="672">ReceiptOS proof substrate</text>
  <text class="body" x="120" y="707">Normalize evidence without importing producer-specific business logic.</text>

  <rect class="soft" x="120" y="735" width="300" height="76" rx="16"/>
  <text class="h2" x="150" y="765">receipt_root</text>
  <text class="small" x="150" y="792">recomputable · anchor-independent</text>

  <rect class="soft" x="480" y="735" width="300" height="76" rx="16"/>
  <text class="h2" x="510" y="765">verifier state</text>
  <text class="small" x="510" y="792">valid · mismatch · missing · anchored</text>

  <path class="arrow" d="M450 850 L450 905"/>

  <rect class="box" x="90" y="915" width="720" height="150" rx="24"/>
  <text class="label" x="130" y="952">SHARED ARTIFACTS</text>
  <text class="h2" x="130" y="990">Stable outputs across producers</text>
  <text class="mono" x="130" y="1022">receiptos.evidence_capsule.v0</text>
  <text class="mono" x="470" y="1022">receiptos.provenance_summary.v0</text>
  <text class="small" x="130" y="1048">proof_refs · replay_refs · anchor_refs · viewer-ready summaries</text>

  <path class="arrow" d="M450 1072 L450 1130"/>

  <rect class="settle" x="80" y="1140" width="740" height="130" rx="24"/>
  <text class="label" x="120" y="1177">DOWNSTREAM USE</text>
  <text class="h2" x="120" y="1215">Viewer / export / settlement-facing references</text>
  <text class="small" x="120" y="1248">ReceiptOS packages proof evidence. CYPHES / ATP decides workflow, credits, and settlement.</text>
</svg>
