<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Crystal Receipt Architecture Scientific Diagram</title>
  <desc id="desc">A black and white scientific-style architecture diagram showing the Crystal Receipt pipeline from receipt evidence to canonicalization, seed derivation, visual traits, action growth mapping, and final artifacts.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#111111"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .frame { fill: #ffffff; stroke: #111111; stroke-width: 2.2; }
      .frame-dashed { fill: #ffffff; stroke: #111111; stroke-width: 2; stroke-dasharray: 8 6; }
      .arrow { stroke: #111111; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .title { font: 700 34px Inter, Segoe UI, Arial, sans-serif; fill: #111111; }
      .subtitle { font: 500 17px Inter, Segoe UI, Arial, sans-serif; fill: #333333; }
      .section { font: 700 24px Inter, Segoe UI, Arial, sans-serif; fill: #111111; }
      .label { font: 600 15px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #111111; }
      .body { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #222222; }
      .small { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #444444; }
      .note { font: 700 15px Inter, Segoe UI, Arial, sans-serif; fill: #111111; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <text x="70" y="70" class="title">Crystal Receipt Architecture</text>
  <text x="70" y="102" class="subtitle">Scientific-style overview of the deterministic receipt → crystal pipeline</text>

  <rect x="70" y="150" width="250" height="560" rx="18" ry="18" class="frame"/>
  <text x="95" y="192" class="section">Receipt Evidence</text>
  <text x="95" y="225" class="small">source fields</text>
  <text x="95" y="270" class="label">session_id</text>
  <text x="95" y="304" class="label">receiptHash</text>
  <text x="95" y="338" class="label">diffHash</text>
  <text x="95" y="372" class="label">eventRoot</text>
  <text x="95" y="406" class="label">agent_id</text>
  <text x="95" y="440" class="label">scope / authority</text>
  <text x="95" y="474" class="label">changed_files</text>
  <text x="95" y="508" class="label">timestamp</text>
  <text x="95" y="542" class="label">verifier_result</text>
  <text x="95" y="576" class="label">signature_trust_block</text>
  <text x="95" y="640" class="body">Every important action gets a receipt.</text>

  <rect x="400" y="150" width="250" height="220" rx="18" ry="18" class="frame"/>
  <text x="425" y="192" class="section">Canonicalization</text>
  <text x="425" y="245" class="label">sorted keys</text>
  <text x="425" y="279" class="label">compact JSON</text>
  <text x="425" y="313" class="label">deterministic SHA-256</text>
  <rect x="425" y="328" width="200" height="28" rx="8" ry="8" class="frame-dashed"/>
  <text x="438" y="347" class="label">canonical_receipt_hash</text>

  <rect x="730" y="150" width="260" height="300" rx="18" ry="18" class="frame"/>
  <text x="755" y="192" class="section">Seed Derivation</text>
  <text x="755" y="225" class="small">deterministic seed material</text>
  <text x="755" y="270" class="label">master_seed</text>
  <text x="755" y="302" class="label">shape_seed</text>
  <text x="755" y="334" class="label">palette_seed</text>
  <text x="755" y="366" class="label">symmetry_seed</text>
  <text x="755" y="398" class="label">layer_seed</text>
  <text x="755" y="430" class="label">oxide_seed</text>
  <text x="755" y="462" class="label">trait_seed</text>

  <rect x="1070" y="150" width="260" height="300" rx="18" ry="18" class="frame"/>
  <text x="1095" y="192" class="section">Visual Traits</text>
  <text x="1095" y="225" class="small">human-readable trait layer</text>
  <text x="1095" y="270" class="label">geometry_style</text>
  <text x="1095" y="302" class="label">palette_name</text>
  <text x="1095" y="334" class="label">symmetry</text>
  <text x="1095" y="366" class="label">layer_count</text>
  <text x="1095" y="398" class="label">shard_count</text>
  <text x="1095" y="430" class="label">oxide_intensity</text>
  <text x="1095" y="462" class="label">edge_bias</text>
  <text x="1095" y="494" class="label">rarity</text>

  <rect x="400" y="520" width="520" height="230" rx="18" ry="18" class="frame"/>
  <text x="425" y="562" class="section">Action Growth Map</text>
  <text x="425" y="596" class="body">receipt action → crystal growth mutation</text>
  <text x="425" y="640" class="label">changed_files → terraces</text>
  <text x="425" y="672" class="label">verifier_result → seal / glow</text>
  <text x="425" y="704" class="label">scope / authority → boundary</text>
  <text x="425" y="736" class="label">diff / eventRoot → fracture / growth pattern</text>

  <rect x="1000" y="520" width="420" height="300" rx="18" ry="18" class="frame"/>
  <text x="1025" y="562" class="section">Crystal Artifact</text>
  <text x="1025" y="608" class="label">crystal.svg</text>
  <text x="1025" y="640" class="label">crystal.metadata.json</text>
  <text x="1025" y="694" class="body">bismuth / hopper-style visual receipt artifact</text>

  <g transform="translate(1220 715)">
    <rect x="-85" y="-85" width="170" height="170" fill="none" stroke="#111111" stroke-width="3"/>
    <rect x="-60" y="-60" width="120" height="120" fill="none" stroke="#111111" stroke-width="2.4"/>
    <rect x="-38" y="-38" width="76" height="76" fill="none" stroke="#111111" stroke-width="2.2"/>
    <rect x="-18" y="-18" width="36" height="36" fill="#ffffff" stroke="#111111" stroke-width="2"/>
    <rect x="-72" y="-10" width="28" height="18" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
    <rect x="44" y="-10" width="28" height="18" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
    <rect x="-10" y="44" width="20" height="28" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
    <rect x="-10" y="-72" width="20" height="28" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
  </g>

  <rect x="1025" y="775" width="245" height="28" rx="8" ry="8" class="frame-dashed"/>
  <text x="1040" y="794" class="note">Visual artifact, not verifier.</text>

  <path d="M320 290 H400" class="arrow"/>
  <path d="M650 290 H730" class="arrow"/>
  <path d="M990 320 H1070" class="arrow"/>
  <path d="M1200 450 V520" class="arrow"/>
  <path d="M860 450 V520" class="arrow"/>
  <path d="M920 635 H1000" class="arrow"/>

  <rect x="70" y="780" width="760" height="130" rx="18" ry="18" class="frame"/>
  <text x="95" y="822" class="section">Deterministic Rule</text>
  <text x="95" y="862" class="label">same receipt evidence → same crystal</text>
  <text x="95" y="894" class="label">changed receipt evidence → different crystal</text>

  <rect x="870" y="860" width="550" height="80" rx="18" ry="18" class="frame"/>
  <text x="895" y="902" class="section">Security Boundary</text>
  <text x="895" y="932" class="small">Crystal, metadata, QR, card, and NFT layers are not the verifier.</text>
</svg>
