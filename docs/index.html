<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crystal Receipt</title>
  <style>
    :root {
      --bg: #0c0f14;
      --panel: #141922;
      --text: #edf2ff;
      --muted: #a8b0c2;
      --line: #283142;
      --accent: #8db6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #0a0d12 0%, #101521 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 24px;
    }
    .card {
      width: min(680px, 100%);
      background: linear-gradient(180deg, var(--panel) 0%, #10161f 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,.28);
    }
    .eyebrow {
      color: var(--accent);
      letter-spacing: .12em;
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 7vw, 56px);
      line-height: 1.02;
    }
    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }
    a.button {
      display: inline-block;
      text-decoration: none;
      color: #07111f;
      background: #cfe1ff;
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 700;
    }
    .small {
      margin-top: 18px;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Crystal Receipt</div>
    <h1>Crystal Receipt</h1>
    <p>Portable proof substrate for agent evidence.</p>
    <a class="button" href="./artifact-viewer/index.html">Open ReceiptOS Viewer</a>
    <div class="small">GitHub Pages landing page for the static multi-receipt ReceiptOS proof substrate viewer.</div>
  </main>
</body>
</html>
